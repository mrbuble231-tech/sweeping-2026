<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutup Dinas 2026</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="menu">
    <a href="index.html">Dashboard Kubikasi</a>
    <a href="rupiah.html">Dashboard Rupiah</a>
    <a href="tutupdinas.html">Dashboard Tutup Dinas</a>
</div>

<div class="container">

    <h3>SWEEPING 2026</h3>
    <h1>Dashboard Monitoring Tutup Dinas 2026</h1>

    <p class="update-info">
        Last Update :
        <span id="lastUpdate"></span>
    </p>

    <div class="cards">

        <div class="card">
            <h4>Total Terima</h4>
            <h2 id="totalTerima">0</h2>
        </div>

        <div class="card">
            <h4>Realisasi Bayar</h4>
            <h2 id="totalBayar">0</h2>
        </div>

        <div class="card">
            <h4>Persentase</h4>
            <h2 id="persentase">0%</h2>
        </div>

        <div class="card">
            <h4>Penangguhan</h4>
            <h2 id="penangguhan">0</h2>
        </div>

    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>No</th>
                    <th>Bulan</th>
                    <th>Terima</th>
                    <th>Bayar</th>
                    <th>%</th>
                    <th>Penangguhan</th>
                </tr>
            </thead>

            <tbody id="tableData"></tbody>

        </table>

    </div>

</div>

<script src="tutupdinas.js"></script>

</body>
</html>
